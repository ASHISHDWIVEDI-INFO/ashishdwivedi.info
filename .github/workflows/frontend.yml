name: 🎨 Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build Next.js on GitHub runner
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint --if-present

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL:  ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NODE_ENV: production
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            frontend/.next/
            frontend/public/
            frontend/package.json
            frontend/package-lock.json
            frontend/next.config.js
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Deploy artifact to Lightsail
  # ─────────────────────────────────────────────
  deploy:
    name: 🚢 Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: ./frontend-build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync build to Lightsail
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/lightsail_key -p ${{ secrets.LIGHTSAIL_PORT || 22 }}" \
            ./frontend-build/ \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/var/www/portfolio/frontend-dist/

      - name: Restart frontend on Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key:      ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port:     ${{ secrets.LIGHTSAIL_PORT || 22 }}
          timeout:  60s
          script: |
            set -e

            echo "📋 Syncing build files..."
            rsync -a --delete \
              /var/www/portfolio/frontend-dist/ \
              /var/www/portfolio/frontend/

            echo "📥 Installing production dependencies..."
            cd /var/www/portfolio/frontend
            npm ci --omit=dev

            echo "♻️  Restarting frontend with PM2..."
            pm2 restart portfolio-frontend --update-env || \
            pm2 start ecosystem.config.js --only portfolio-frontend

            pm2 save

            echo "🏥 Health check..."
            sleep 4
            curl -sf http://localhost:3000 -o /dev/null && \
              echo "✅ Frontend is healthy" || \
              (echo "❌ Frontend health check failed!" && pm2 logs portfolio-frontend --lines 20 && exit 1)

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/lightsail_key

      - name: Notify success
        if: success()
        run: echo "✅ Frontend deployed successfully!"