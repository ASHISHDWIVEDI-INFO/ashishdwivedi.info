# ============================================================
# Nginx config for ashishdwivedi.info on AWS Lightsail
# Place at: /etc/nginx/sites-available/portfolio
# Enable:   sudo ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx
# ============================================================

# ── Rate limiting zones ───────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

# ── Redirect HTTP → HTTPS ─────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ashishdwivedi.info www.ashishdwivedi.info;

    # Let's Encrypt challenge (Certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ashishdwivedi.info www.ashishdwivedi.info;

    # ── SSL (Let's Encrypt via Certbot) ──────
    ssl_certificate     /etc/letsencrypt/live/ashishdwivedi.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashishdwivedi.info/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────
    add_header X-Frame-Options           DENY             always;
    add_header X-Content-Type-Options    nosniff          always;
    add_header X-XSS-Protection          "1; mode=block"  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ──────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Client body size ──────────────────────
    client_max_body_size 20M;

    # ── API routes → Express (port 5000) ─────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # No cache for API
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Contact form - stricter rate limit ────
    location /api/contact {
        limit_req zone=contact burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (no rate limit) ─────────
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }

    # ── Next.js static files (long cache) ────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Next.js image optimization ────────────
    location /_next/image {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Static assets (favicon, robots, etc) ─
    location /static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── Next.js app → (port 3000) ─────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Error pages ───────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
    }
}
