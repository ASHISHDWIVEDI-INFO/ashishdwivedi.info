###############################################################################
# .github/workflows/deploy-backend.yml
#
# Pipeline stages
# ───────────────
# 1. test      — Run the test suite in CI. Deploy never starts if tests fail.
# 2. deploy    — SSH into Lightsail, create a timestamped release, run deploy.sh
# 3. smoke     — Hit /health + key API routes. Fail the job if any return non-2xx.
# 4. rollback  — If smoke tests fail, re-point the `current` symlink to the
#                previous release and restart PM2. Runs automatically.
# 5. notify    — Post a Slack/Discord message on success or failure (optional).
#
# REQUIRED GITHUB SECRETS
# ───────────────────────
# Set these under Settings → Secrets → Actions in your repo:
#
#   SSH_HOST          Lightsail instance public IP or hostname
#   SSH_USER          SSH username (usually "ubuntu" or "bitnami")
#   SSH_PRIVATE_KEY   Private key for SSH access (contents of ~/.ssh/id_rsa)
#   API_BASE_URL      e.g. https://api.ashishdwivedi.info
#   SLACK_WEBHOOK     (optional) Slack incoming webhook URL for notifications
###############################################################################

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "Backend/**"
      - ".github/workflows/deploy-backend.yml"

  # Allow manual trigger from the Actions tab (useful for forced re-deploys).
  workflow_dispatch:

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      # Spin up a MongoDB instance for integration tests.
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        working-directory: Backend
        run: npm ci

      - name: Run tests
        working-directory: Backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/portfolio_test
          # Provide minimal env so env.js validation passes in test mode.
          # These are non-sensitive test-only values — safe in CI env vars.
          ALLOWED_ORIGINS: http://localhost:3000
          SMTP_HOST: smtp.example.com
          SMTP_PORT: 587
          SMTP_USER: test@example.com
          SMTP_PASS: testpass
          CONTACT_RECIPIENT_EMAIL: test@example.com
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
        run: npm test

  # ── 2. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: test   # Only runs if test job passes

    # Expose the release tag so the smoke and rollback jobs can reference it.
    outputs:
      release_tag: ${{ steps.set_tag.outputs.release_tag }}

    steps:
      - name: Generate release tag
        id: set_tag
        # Format: YYYYMMDD-HHMMSS-<short SHA> — human-readable + unique
        run: echo "release_tag=$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deploy script to server
        run: |
          scp scripts/deploy.sh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/deploy.sh
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "chmod +x /tmp/deploy.sh"

      - name: Run deploy script on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "RELEASE_TAG=${{ steps.set_tag.outputs.release_tag }} \
             REPO_URL=git@github.com:${{ github.repository }}.git \
             GIT_SHA=${{ github.sha }} \
             bash /tmp/deploy.sh"

  # ── 3. Smoke test ────────────────────────────────────────────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy

    outputs:
      smoke_passed: ${{ steps.run_smoke.outputs.passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for server to settle
        run: sleep 10

      - name: Run smoke tests
        id: run_smoke
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          chmod +x scripts/smoke-test.sh
          if bash scripts/smoke-test.sh; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # ── 4. Rollback ──────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke]
    # Only run if the smoke test job failed (not if it was skipped/cancelled).
    if: failure() && needs.smoke.result == 'failure'

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback to previous release
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "FAILED_RELEASE=${{ needs.deploy.outputs.release_tag }} bash -s" << 'ROLLBACK'
              set -euo pipefail

              RELEASES_DIR="/var/www/portfolio/releases"
              CURRENT_LINK="/var/www/portfolio/current"

              echo "=== Rollback triggered. Failed release: $FAILED_RELEASE ==="

              # Find the most recent release that is NOT the failed one.
              PREVIOUS=$(ls -1t "$RELEASES_DIR" \
                | grep -v "$FAILED_RELEASE" \
                | head -1)

              if [ -z "$PREVIOUS" ]; then
                echo "ERROR: No previous release to roll back to."
                exit 1
              fi

              echo "Rolling back to: $PREVIOUS"

              # Re-point the symlink.
              ln -sfn "$RELEASES_DIR/$PREVIOUS" "$CURRENT_LINK"

              # Restart PM2 with the previous release.
              cd "$CURRENT_LINK/Backend"
              pm2 reload ecosystem.config.js --env production

              echo "Rollback complete. Serving: $PREVIOUS"
          ROLLBACK

      - name: Post rollback notification
        if: always()
        run: |
          echo "::error::Smoke tests failed. Rolled back to previous release."
          echo "::error::Failed release: ${{ needs.deploy.outputs.release_tag }}"

  # ── 5. Notify (optional) ─────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, smoke]
    if: always() && vars.SLACK_NOTIFICATIONS_ENABLED == 'true'

    steps:
      - name: Slack success
        if: needs.smoke.result == 'success'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"✅ Backend deploy succeeded. Release: \`${{ needs.deploy.outputs.release_tag }}\`\"}"

      - name: Slack failure
        if: needs.smoke.result == 'failure'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🚨 Backend deploy FAILED and was rolled back. Release: \`${{ needs.deploy.outputs.release_tag }}\` — check Actions for details.\"}"