###############################################################################
# .github/workflows/deploy-frontend.yml
#
# Same pipeline structure as the backend:
#   build → deploy → smoke → rollback on failure
#
# REQUIRED GITHUB SECRETS (in addition to shared SSH secrets)
#   NEXT_PUBLIC_API_URL   The backend API URL, injected at build time
#   SITE_BASE_URL         e.g. https://ashishdwivedi.info (for smoke tests)
###############################################################################

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "Frontend/**"
      - ".github/workflows/deploy-frontend.yml"

  workflow_dispatch:

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build
        working-directory: Frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NODE_ENV: production
        run: npm run build

      # Cache the build output so the deploy job doesn't need to rebuild.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: |
            Frontend/.next
            Frontend/public
          retention-days: 1

  # ── 2. Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build

    outputs:
      release_tag: ${{ steps.set_tag.outputs.release_tag }}

    steps:
      - name: Generate release tag
        id: set_tag
        run: echo "release_tag=$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: Frontend

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync build to server
        run: |
          RELEASE_TAG=${{ steps.set_tag.outputs.release_tag }}
          RELEASE_DIR="/var/www/portfolio/frontend-releases/$RELEASE_TAG"

          # Create release directory on server.
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p $RELEASE_DIR"

          # Rsync — only transfers changed files, skips node_modules.
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            Frontend/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$RELEASE_DIR/

          # Install production deps and point `current` symlink.
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            set -euo pipefail
            cd $RELEASE_DIR
            npm ci --omit=dev
            ln -sfn $RELEASE_DIR /var/www/portfolio/frontend-current
            pm2 reload ecosystem.config.js --only portfolio-frontend --env production
            echo "Frontend release $RELEASE_TAG is live."
          EOF
  # ── 3. Smoke test ─────────────────────────────────────────────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for server to settle
        run: sleep 10

      - name: Check homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SITE_BASE_URL }}/")
          echo "Homepage status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: homepage returned $STATUS"; exit 1; }

      - name: Check sitemap (SSG health)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SITE_BASE_URL }}/sitemap.xml")
          echo "Sitemap status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: sitemap returned $STATUS"; exit 1; }

  # ── 4. Rollback ───────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke]
    if: failure() && needs.smoke.result == 'failure'

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback frontend
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "FAILED_RELEASE=${{ needs.deploy.outputs.release_tag }} bash -s" << 'ROLLBACK'
              set -euo pipefail
              RELEASES_DIR="/var/www/portfolio/frontend-releases"
              CURRENT_LINK="/var/www/portfolio/frontend-current"

              PREVIOUS=$(ls -1t "$RELEASES_DIR" | grep -v "$FAILED_RELEASE" | head -1)
              [ -z "$PREVIOUS" ] && { echo "No previous frontend release found."; exit 1; }

              echo "Rolling back frontend to: $PREVIOUS"
              ln -sfn "$RELEASES_DIR/$PREVIOUS" "$CURRENT_LINK"
              pm2 reload ecosystem.config.js --only portfolio-frontend --env production
              echo "Frontend rollback complete."
          ROLLBACK

      - name: Annotate failure
        run: |
          echo "::error::Frontend smoke test failed. Rolled back to previous release."